---
new_page_extension: md
auto_deploy: false
admin_path: ''
webhook_url: 
sections:
- type: jekyll-pages
  label: Pages
  create: documents
- type: heading
  label: Posts
- type: directory
  path: work/_posts
  label: Work
  create: documents
  match: "**/*"
- type: directory
  path: articles/_posts
  label: Articles
  create: all
  match: "**/*"
upload_dir: img
public_path: "/img"
front_matter_path: ''
use_front_matter_path: false
file_template: ":filename:"
build:
  output_directory: _site
